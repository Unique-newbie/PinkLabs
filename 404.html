<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — PinkLabs">
  <meta name="theme-color" content="#E91E63">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>404 — PinkLabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink-primary: #E91E63; --pink-light: #FF4081; --pink-gradient: linear-gradient(135deg, #E91E63, #FF4081);
      --bg: #fafafa; --bg-card: #ffffff; --text: #1a1a1a; --text-sub: #555555; --border: #e8e8e8;
    }
    [data-theme="dark"] {
      --bg: #0c0c0c; --bg-card: #1a1a1a; --text: #f0f0f0; --text-sub: #a0a0a0; --border: #2a2a2a;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; position: relative; transition: background 0.4s ease, color 0.4s ease;
    }
    body::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(233,30,99,0.08), transparent 60%);
    }
    .content { position: relative; z-index: 1; text-align: center; padding: 24px; max-width: 600px; }
    .error-code {
      font-family: 'Outfit', sans-serif; font-size: 8rem; font-weight: 900;
      line-height: 1; background: var(--pink-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px; letter-spacing: -4px;
    }
    .error-title {
      font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800;
      margin-bottom: 16px;
    }
    .error-desc { font-size: 1.05rem; color: var(--text-sub); line-height: 1.7; margin-bottom: 36px; }
    .actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px;
      border-radius: 50px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
      text-decoration: none; transition: all 0.3s ease; border: none; cursor: pointer;
    }
    .btn-primary { background: var(--pink-gradient); color: white; box-shadow: 0 8px 30px rgba(233,30,99,0.25); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(233,30,99,0.35); }
    .btn-secondary { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { border-color: var(--pink-primary); color: var(--pink-primary); transform: translateY(-2px); }
    .logo {
      position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px; text-decoration: none;
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.25rem; color: var(--text);
    }
    .logo-icon {
      width: 36px; height: 36px; background: var(--pink-gradient);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 900; font-size: 1.1rem;
    }
    .decoration {
      position: absolute; border-radius: 50%; opacity: 0.15;
      background: var(--pink-primary); filter: blur(60px); pointer-events: none;
    }
    .dec-1 { width: 300px; height: 300px; top: -80px; right: -80px; }
    .dec-2 { width: 200px; height: 200px; bottom: -40px; left: -60px; }
    @media (max-width: 480px) {
      .error-code { font-size: 5rem; }
      .error-title { font-size: 1.4rem; }
      .actions { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="decoration dec-1"></div>
  <div class="decoration dec-2"></div>

  <a href="/" class="logo"><span class="logo-icon">P</span><span>PinkLabs</span></a>

  <div class="content">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <a href="/reachout" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Reach Out
      </a>
    </div>
  </div>

  <script>
    const stored = localStorage.getItem('pinklabs-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored) document.documentElement.setAttribute('data-theme', stored);
    else if (prefersDark) document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</body>
</html>
